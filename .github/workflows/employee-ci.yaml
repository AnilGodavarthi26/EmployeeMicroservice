name: Employee CI Pipeline
run-name: Employee CI Pipeline # Name of the workflow that will be displayed in GitHub Actions when the workflow is triggered.
on: # Specifies the events that will trigger the workflow. In this case, the workflow will be triggered on push and pull request events to the main branch, as well as manually through the GitHub Actions interface.
  push: # Specifies that the workflow should be triggered when there is a push event to the repository.
    branches: [ main ] # Specifies that the workflow should be triggered when there is a push event to the main branch of the repository.
  pull_request: # Specifies that the workflow should be triggered when there is a pull request event to the repository.
    branches: [ main ] # Specifies that the workflow should be triggered when there is a pull request event targeting the main branch of the repository.
  workflow_dispatch:  # Specifies that the workflow can also be triggered manually through the GitHub Actions interface, allowing users to run the workflow on demand without needing to push code or create a pull request.
jobs:
    build:
        name: Maven Build and Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6 # Source code checkout from the repository
            - name: Set up JDK 17 # Name of the action step
              uses: actions/setup-java@v4 # Setup Java action to configure the Java environment
              with: # Input parameters for the setup-java action
                java-version: '17' # Specify the Java version to be used in the workflow
                distribution: 'temurin' # Specify the Java distribution to be used (e.g., temurin, zulu, etc.)
                cache: maven # Enable caching for Maven dependencies to speed up subsequent builds
            - name: Build and Test & Package # Name of the action step
              run: cd employee && mvn --batch-mode --update-snapshots verify # Command to build the project, run tests, and package the application using Maven
            - uses: actions/upload-artifact@v4 # Action to upload build artifacts (e.g., JAR files) to GitHub Actions for later use in other jobs or for download
              with: # Input parameters for the upload-artifact action
                name: Package # Name of the artifact that needs to be uploaded
                path: employee/target/*.jar # specifies the location of the file or folder that needs to be uploaded as an artifact.
    Sonar:
        name: SonarQube Analysis # Name of the job that performs SonarQube analysis on the codebase to check for code quality and security issues.
        runs-on: ubuntu-latest # Specifies the type of runner(VM) that the job will run on
        needs: build
        steps:
            - uses: actions/checkout@v6 # Source code checkout from the repository
            - name: Set up JDK 17 # Name of the action step
              uses: actions/setup-java@v4 # Setup Java action to configure the Java environment
              with: # Input parameters for the setup-java action
                java-version: '17' # Specify the Java version to be used in the workflow
                distribution: 'temurin' # Specify the Java distribution to be used (e.g., temurin, zulu, etc.)
                cache: maven # Enable caching for Maven dependencies to speed up subsequent builds
            - name: Cache SonarQube packages # Name of the action step to cache SonarQube packages to speed up subsequent runs of the SonarQube analysis
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0 # Action to cache files and directories in GitHub Actions
              with:
               path: ~/.sonar/cache # Specifies the path to the SonarQube cache directory that needs to be cached
               key: ${{ runner.os }}-sonar # Unique key for the cache entry, which includes the operating system and a specific identifier (e.g., "sonar") to differentiate it from other cache entries
               restore-keys: ${{ runner.os }}-sonar # Fallback keys to restore the cache if the primary key is not found, allowing for more flexible cache retrieval based on the operating system and identifier
            - name: Cache Maven packages # Name of the action step to cache Maven packages to speed up subsequent builds and SonarQube analysis
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0 # Action to cache files and directories in GitHub Actions
              with:
                path: ~/.m2 # Specifies the path to the Maven local repository that needs to be cached
                key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}   # Unique key for the cache entry, which includes the operating system and a hash of the pom.xml files to ensure that the cache is specific to the current state of the Maven project
                restore-keys: ${{ runner.os }}-m2   # Fallback keys to restore the cache if the primary key is not found, allowing for more flexible cache retrieval based on the operating system and Maven dependencies
            - name: Build and analyze
              env:
                SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}   # Environment variable to store the SonarQube token securely from GitHub Secrets
              run: cd employee && mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Pcoverage -Dsonar.projectKey=AnilGodavarthi26_EmployeeMicroservice # Command to build the project, run tests, and perform SonarQube analysis using Maven, with specific parameters for the SonarQube project key and profile for code coverage
    Image_Build_and_Push_to_Registry:
        name: Employee Microservice Docker Image Build # Name of the job that builds a Docker image for the Employee microservice and pushes it to a Docker registry.
        runs-on: ubuntu-latest
        needs: [build, Sonar] # Specifies that this job depends on the successful completion of both the "build" and "Sonar" jobs, ensuring that the Docker image is only built and pushed if the previous steps have completed successfully.
        steps:
            - uses: actions/checkout@v6
            - name: Build Docker Image
              run: cd employee && docker build -t ${{vars.DOCKERHUB_USERNAME}}/employee:${{(github.run_number)}} . # Command to build a Docker image for the Employee microservice using the Dockerfile in the "employee" directory, tagging the image with the DockerHub username and the GitHub Actions run number for versioning.

            - name: Log in to DockerHub
              uses: docker/login-action@v2
              with:
                username: ${{ vars.DOCKERHUB_USERNAME }} # Environment variable to store the DockerHub username securely from GitHub Secrets
                password: ${{ secrets.DOCKERHUB_TOKEN }} # Environment variable to store the DockerHub token securely from GitHub Secrets
            
            - name: Push Image to DockerHub
              run: docker push ${{vars.DOCKERHUB_USERNAME}}/employee:${{ github.run_number }} # Command to push the built Docker image to DockerHub using the DockerHub username and the GitHub Actions run number for versioning.

            - name: Run Trivy vulnerability scanner
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                image-ref: '${{vars.DOCKERHUB_USERNAME}}/employee:${{ github.run_number }}' # Reference to the Docker image that needs to be scanned for vulnerabilities, using the DockerHub username and the GitHub Actions run number for versioning.
                format: 'table' # Specifies the output format for the vulnerability scan results, in this case, a table format for better readability.
                exit-code: '0' # Specifies the exit code that the Trivy action should return if vulnerabilities are found, allowing the workflow to continue even if vulnerabilities are detected (e.g., exit code 0 means the workflow will not fail due to vulnerabilities).
                ignore-unfixed: true # Option to ignore vulnerabilities that do not have a fix available, allowing the workflow to focus on actionable vulnerabilities.
                vuln-type: 'os,library' # Specifies the types of vulnerabilities to scan for, in this case, both operating system and library vulnerabilities will be included in the scan.