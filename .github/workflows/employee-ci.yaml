name: Employee CI Pipeline
run-name: Employee CI Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
    build:
        name: Maven Build and Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                java-version: '17'
                distribution: 'temurin'
                cache: maven
            - name: Build and Test
              run: cd employee && mvn clean validate compile test test-compile
    Sonar:
        name: SonarQube Analysis
        runs-on: ubuntu-latest
        needs: build
        steps:
            - uses: actions/checkout@v6
            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                java-version: '17'
                distribution: 'temurin'
                cache: maven
            - name: SonarQube Analysis
              env:
                SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
              run: cd employee && mvn sonar:sonar -Dsonar.projectKey=anilgodavarthi26 -Dsonar.organization=anilgodavarthi26 -Dsonar.host.url=https://sonarcloud.io -Dsonar.login=${{ secrets.SONAR }}
              