name: Employee CI Pipeline
run-name: Employee CI Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - name: Set up JDK 17
              uses: actions/setup-java@v4
              with:
                java-version: '17'
                distribution: 'temurin'
                cache: maven
            - name: Change Directory to Employee
              run: ls cd /employee && mvn -version
            - name: Build and Test
              run: mvn clean validate compile test test-compile